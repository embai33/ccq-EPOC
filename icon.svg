  <path d="M248 200 C248 200 240 210 225 215" stroke="rgba(255,255,255,0.9)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Bronchi right -->
  <path d="M264 200 C264 200 272 210 287 215" stroke="rgba(255,255,255,0.9)" stroke-width="10" fill="none" stroke-linecap="round"/>
